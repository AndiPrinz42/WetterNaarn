<div class="inputWrapper">
    <div class="input">
        <div class="title">Langzeitwerte</div>
        <div class="select">
            <input type="date" id="date-from" name="chart-from" min="2017-01-01" max="" onclick="this.showPicker()">
            <div class="dash_longtime">-</div>
            <input type="date" id="date-to" name="chart-to" min="2017-01-01" max="" onclick="this.showPicker()">
            <input type="number" id="frequency" name="frequency" value="1" min="1" style="display: none;">

            <select data-placeholder="Sensoren auswählen..." id="sensors" class="sensors" size="2" multiple>
                <optgroup label="Temperatur">
                    <option selected>Temperatur</option>
                    <option>Temperatur Min</option>
                    <option>Temperatur Max</option>
                </optgroup>
                <optgroup label="Taupunkt">
                    <option>Taupunkt</option>
                    <option>Taupunkt Min</option>
                    <option>Taupunkt Max</option>
                </optgroup>
                <optgroup label="Luftfeuchte">
                    <option>Luftfeuchte</option>
                    <option>Luftfeuchte Min</option>
                    <option>Luftfeuchte Max</option>
                </optgroup>
                <optgroup label="Luftdruck">
                    <option>Luftdruck</option>
                    <option>Luftdruck Min</option>
                    <option>Luftdruck Max</option>
                </optgroup>
                <option>Regen</option>
                <optgroup label="Wind">
                    <option>Windgeschwindigkeit</option>
                    <option>Windgeschwindigkeit Max</option>
                    <option>Windrichtung</option>
                </optgroup>
                <optgroup label="Windböen">
                    <option>Windböen</option>
                    <option>Windböen Max</option>
                </optgroup>
                <optgroup label="Windchill">
                    <option>Windchill</option>
                    <option>Windchill Min</option>
                    <option>Windchill Max</option>
                </optgroup>
            </select>
        </div>

        <div class="btnWrapper margin">
            <div class="btn">
                <button type="button" id="refresh_btn" class="full_btn"><i class='bx bx-refresh'></i> Werte aktualisieren</button>
                <button type="button" id="viewToggle" class="icon_btn"><i id="viewTypeIcon" class='bx bx-table'></i></button>
                <button type="button" id="download" class="icon_btn"><i class='bx bxs-download'></i></button>
            </div>
        </div>

    </div>
</div>

<div id="chartWrapper">
    <canvas id="chartElement">No Canvas support</canvas>
    <div class="loader">
        Keine Javascript Unterstützung...
    </div>
</div>

<div id="tableWrapper"></div>
